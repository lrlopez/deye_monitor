; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:sunton_4827s043]
platform = espressif32 @ ^6.0.0
board = esp32s3box
framework = arduino
lib_deps = 
	lvgl/lvgl@^9.2
	moononournation/GFX Library for Arduino@1.5.0
	tamctec/TAMC_GT911@^1.0.2
	witnessmenow/UniversalTelegramBot@^1.3.0
    bblanchon/ArduinoJson@^7.0.0
upload_speed = 460800
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
build_flags = 
    -Iinclude
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DLV_CONF_INCLUDE_SIMPLE
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
	-DBOARD_ESP32_SUNTON_4827S043
	-DDBGSERIAL=Serial0
	-DSCREEN_WIDTH=480
	-DSCREEN_HEIGHT=270
	-DFONT_SMALL_SIZE=12
	-DFONT_SMALL=lv_font_montserrat_12
	-DFONT_NORMAL_SIZE=14
	-DFONT_NORMAL=lv_font_montserrat_14
	-DFONT_LARGE_SIZE=28
	-DFONT_LARGE=lv_font_montserrat_28

[env:guition_jc1060p470]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4-evboard
framework = arduino
extra_scripts = pre:scripts/patch_gfx_p4.py
lib_deps = 
	lvgl/lvgl@^9.2
	moononournation/GFX Library for Arduino@^1.6.5
	tamctec/TAMC_GT911@^1.0.2
	witnessmenow/UniversalTelegramBot@^1.3.0
	bblanchon/ArduinoJson@^7.0.0
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags = 
	-Iinclude
	-DBOARD_HAS_PSRAM
	-DLV_CONF_INCLUDE_SIMPLE
	-DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
	-DBOARD_GUITION_JC1060P470
	-DDBGSERIAL=Serial
	-DSCREEN_WIDTH=1024
	-DSCREEN_HEIGHT=600
	-DFONT_SMALL_SIZE=28
	-DFONT_SMALL=lv_font_montserrat_28
	-DFONT_NORMAL_SIZE=32
	-DFONT_NORMAL=lv_font_montserrat_32
	-DFONT_LARGE_SIZE=48
	-DFONT_LARGE=lv_font_montserrat_48
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

